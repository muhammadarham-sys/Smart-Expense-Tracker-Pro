<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker Pro</title>

    <link rel="stylesheet" href="../css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>💰 Smart Expense Tracker</h2>

        <button onclick="scrollToSection('dashboardSection')">
            📊 Dashboard
        </button>

        <button onclick="scrollToSection('budgetSection')">
            💵 Budget
        </button>

        <button onclick="scrollToSection('expenseSection')">
            🧾 Expenses
        </button>

        <button onclick="toggleDarkMode()">
            🌙 Dark Mode
        </button>

        <button onclick="logout()">
            🚪 Logout
        </button>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- HEADER -->

        <div
                class="header"
                id="dashboardSection">

            <h1>
                Expense Dashboard
            </h1>

            <p id="greeting">
                Welcome Back 👋
            </p>

        </div>

        <!-- STATISTICS -->

        <div class="cards">

            <div class="card">

                <h3>Total Budget</h3>

                <p id="budgetDisplay">
                    Rs 0
                </p>

            </div>

            <div class="card">

                <h3>Total Expenses</h3>

                <p id="expenseDisplay">
                    Rs 0
                </p>

            </div>

            <div class="card">

                <h3>Remaining Budget</h3>

                <p id="remainingDisplay">
                    Rs 0
                </p>

                <div class="progress-container">

                    <div
                            id="budgetProgress"
                            class="progress-bar">
                    </div>

                </div>

            </div>

            <div class="card">

                <h3>Status</h3>

                <p id="warningMessage">
                    Safe
                </p>

            </div>

            <div class="card">

                <h3>Total Transactions</h3>

                <p id="transactionCount">
                    0
                </p>

            </div>

        </div>

        <!-- CHART -->

        <div class="section">

            <h2>
                📊 Expense Analytics
            </h2>

            <canvas
                    id="expenseChart"
                    height="100">
            </canvas>

        </div>

        <!-- BUDGET -->

        <div
                class="section"
                id="budgetSection">

            <h2>
                💵 Budget Overview
            </h2>

            <input
                    type="number"
                    id="budgetAmount"
                    placeholder="Enter Budget Amount">

            <button onclick="setBudget()">
                Save Budget
            </button>

        </div>

        <!-- ADD EXPENSE -->

        <div class="section">

            <h2>
                ➕ Add Expense
            </h2>

            <input
                    type="text"
                    id="expenseTitle"
                    placeholder="Expense Title">

            <input
                    type="number"
                    id="expenseAmount"
                    placeholder="Expense Amount">

            <select id="category">

                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Other</option>

            </select>

            <button onclick="addExpense()">
                Save Expense
            </button>

        </div>

        <!-- EXPENSE TABLE -->

        <div
                class="section"
                id="expenseSection">

            <h2>
                📋 Expense Records
            </h2>

            <input
                    type="text"
                    id="searchBox"
                    placeholder="Search Expense..."
                    onkeyup="searchExpenses()">

            <table id="expenseTable">

                <thead>

                <tr>

                    <th>Title</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="../js/dashboard.js"></script>

</body>
</html>
